services:
  moments:
    build: .
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_HTTP_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/q/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
