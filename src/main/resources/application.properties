# HTTP
quarkus.http.port=8080

# DataSource - H2 in-memory
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:momentsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration,classpath:db/demo

# Quinoa (frontend build integration)
quarkus.quinoa.build-dir=dist
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.package-manager-install=false

# CORS: only needed when frontend is opened via `npm run dev` directly on port 5173
# (Vite proxies /api to localhost:8080, so browser sees same-origin requests)
# When using `quarkus:dev`, Quinoa proxies everything through port 8080 – CORS is not required.
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:5173

# OpenAPI / Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Tests: clean schema only, no demo data
%test.quarkus.flyway.locations=classpath:db/migration
%test.quarkus.quinoa.enabled=false
%test.quarkus.hibernate-orm.log.sql=false
